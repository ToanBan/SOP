version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: sop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sop_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sop-network

  mongodb:
    image: mongo:latest
    container_name: sop-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sop-network

  redis:
    image: redis:alpine
    container_name: sop-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - sop-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sop-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - sop-network

  kong-db:
    image: postgres:13
    container_name: kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpassword
    ports:
      - "5432:5432"
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - sop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:latest
    command: kong migrations bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PASSWORD: kongpassword
    networks:
      - sop-network

  kong:
    image: kong:latest
    container_name: sop-kong
    restart: always
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PASSWORD: kongpassword
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - sop-network

  konga:
    image: pantsel/konga
    container_name: sop-konga
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "1337:1337"
    networks:
      - sop-network

  socket-service-1:
    image: node:20-alpine
    container_name: sop-socket-1
    restart: always
    working_dir: /app
    volumes:
      - ./apps/socket-service:/app
      - sop-socket-modules:/app/node_modules
    command: sh -c "npm install && node dist/main.js"
    environment:
      - PORT=4001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - BE_URL=http://kong:8000
    depends_on:
      - redis
    networks:
      - sop-network

  socket-service-2:
    image: node:20-alpine
    container_name: sop-socket-2
    restart: always
    working_dir: /app
    volumes:
      - ./apps/socket-service:/app
      - sop-socket-modules:/app/node_modules
    command: sh -c "node dist/main.js"
    environment:
      - PORT=4002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - BE_URL=http://kong:8000
    depends_on:
      - socket-service-1
      - redis
    networks:
      - sop-network

  nginx-socket:
    image: nginx:alpine
    container_name: sop-nginx-socket
    restart: always
    ports:
      - "4999:80" # frontend vẫn connect vào 4000 như cũ
    volumes:
      - ./nginx.socket.conf:/etc/nginx/nginx.conf
    depends_on:
      - socket-service-1
      - socket-service-2
    networks:
      - sop-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: sop-ngrok
    restart: unless-stopped
    depends_on:
      - kong
    command: ["http", "http://kong:8000"]
    environment:
      NGROK_AUTHTOKEN: 36sDGrEz255ulqdWhxdvYPd8Vsx_62tQoUceaPPsXq9QrUqBR
    ports:
      - "4040:4040"
    networks:
      - sop-network

  minio:
    image: minio/minio:latest
    container_name: sop-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000" # API endpoint
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    networks:
      - sop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
networks:
  sop-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  kong_db_data:
  minio_data:
  sop-socket-modules:
