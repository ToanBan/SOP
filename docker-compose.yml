version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sop_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sop-network

  mongodb:
    image: mongo:latest
    container_name: sop-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sop-network

  redis:
    image: redis:alpine
    container_name: sop-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - sop-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sop-rabbitmq
    restart: always
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - sop-network

  kong-db:
    image: postgres:13
    container_name: kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpassword
    ports:
      - "5432:5432"
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - sop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:latest
    command: kong migrations bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PASSWORD: kongpassword
    networks:
      - sop-network

  kong:
    image: kong:latest
    container_name: sop-kong
    restart: always
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PASSWORD: kongpassword
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000" 
      - "8001:8001"  
    networks:
      - sop-network

  konga:
    image: pantsel/konga
    container_name: sop-konga
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "1337:1337"
    networks:
      - sop-network

networks:
  sop-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  kong_db_data: